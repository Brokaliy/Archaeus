# Archaeus - Kitty Terminal Config
# Coffee shop theme

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Cursor
cursor_shape     block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
copy_on_select yes

# Window
remember_window_size  yes
initial_window_width  800
initial_window_height 520
window_padding_width  16
window_border_width   0
draw_minimal_borders  yes

# Tabs
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2

# Background transparency
background_opacity 0.92
dynamic_background_opacity yes

# Color scheme — Archaeus Coffee
# Dark warm background, cream text, amber accents
background            #1C1610
foreground            #E8D5B0
selection_background  #3D2E1E
selection_foreground  #E8D5B0
cursor                #C8A96E
cursor_text_color     #1C1610

# Black
color0  #2E2520
color8  #5A4A3A

# Red
color1  #C25B4A
color9  #D4705F

# Green
color2  #7A9E6E
color10 #92B886

# Yellow / Amber
color3  #C8A96E
color11 #D4B87A

# Blue
color4  #6B8FAB
color12 #7DA3BF

# Magenta
color5  #A67B9B
color13 #BE96B4

# Cyan
color6  #6FA89E
color14 #85BEB4

# White
color7  #C4AC8C
color15 #E8D5B0

# Tab bar colors
active_tab_background   #3D2E1E
active_tab_foreground   #C8A96E
inactive_tab_background #1C1610
inactive_tab_foreground #7A6A5A

# URL style
url_color #C8A96E
url_style curly

# Misc
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes
confirm_os_window_close 0
